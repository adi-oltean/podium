name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: ruff check src tests examples
      - run: pytest --cov=podium --cov-report=term --cov-fail-under=100
  # Placeholder for the validation gate: when the C emitter lands, this job
  # will translate podium.core and run the external abstract-interpretation
  # tool over the generated sources.
