// LVLH -> three.js: x radial -> +Y (up), y along-track -> +X, z cross -> +Z
const toScene = (x, y, z) => new THREE.Vector3(y, x, z);

const T = DATA.t, X = DATA.x, NPT = T.length;
const DOCK = toScene(...DATA.meta.dock);
const KOZ_R = 200.0;

const canvas = document.getElementById("view");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true,
  preserveDrawingBuffer: true });  // enables pixel readback in UI tests
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0e14);
const camera = new THREE.PerspectiveCamera(50, 2, 0.5, 50000);
scene.add(new THREE.AmbientLight(0x8899aa, 0.7));
const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(2000, 3000, 1500);
scene.add(sun);

// target station: body + docking port ring on the -along-track face
const station = new THREE.Group();
const body = new THREE.Mesh(
  new THREE.BoxGeometry(14, 8, 8),
  new THREE.MeshStandardMaterial({ color: 0x5b6b7f, roughness: 0.8 }));
station.add(body);
const ring = new THREE.Mesh(
  new THREE.TorusGeometry(2.2, 0.5, 10, 32),
  new THREE.MeshStandardMaterial({ color: 0xffd166, roughness: 0.4 }));
ring.rotation.y = Math.PI / 2;
ring.position.x = -7.5;
station.add(ring);
station.position.copy(DOCK).add(new THREE.Vector3(7.6, 0, 0));
scene.add(station);

// keep-out sphere (wireframe) centered on the target
const koz = new THREE.LineSegments(
  new THREE.WireframeGeometry(new THREE.SphereGeometry(KOZ_R, 18, 12)),
  new THREE.LineBasicMaterial({ color: 0xff6b6b, transparent: true, opacity: 0.18 }));
scene.add(koz);

// approach corridor: translucent cone opening along -X from the dock
const CONE_LEN = 900, CONE_HALF = 10 * Math.PI / 180;
const cone = new THREE.Mesh(
  new THREE.ConeGeometry(Math.tan(CONE_HALF) * CONE_LEN, CONE_LEN, 40, 1, true),
  new THREE.MeshBasicMaterial({ color: 0x5ac8fa, transparent: true,
    opacity: 0.07, side: THREE.DoubleSide, depthWrite: false }));
cone.position.copy(DOCK).add(new THREE.Vector3(-CONE_LEN / 2, 0, 0));
cone.rotation.z = -Math.PI / 2;
scene.add(cone);

// V-bar plane grid (local horizontal: radial = 0)
const grid = new THREE.GridHelper(2400, 24, 0x1b2432, 0x151d29);
scene.add(grid);

// trajectory trail: preallocated buffer, drawRange grows with playback
const trailPos = new Float32Array(NPT * 3);
for (let i = 0; i < NPT; i++) {
  const p = toScene(X[i][0], X[i][1], X[i][2]);
  trailPos[3 * i] = p.x; trailPos[3 * i + 1] = p.y; trailPos[3 * i + 2] = p.z;
}
const trailGeom = new THREE.BufferGeometry();
trailGeom.setAttribute("position", new THREE.BufferAttribute(trailPos, 3));
trailGeom.setDrawRange(0, 1);
scene.add(new THREE.Line(trailGeom,
  new THREE.LineBasicMaterial({ color: 0x5ac8fa })));

// chaser marker + burn glyphs
const chaser = new THREE.Mesh(
  new THREE.OctahedronGeometry(4),
  new THREE.MeshStandardMaterial({ color: 0x7ee787, roughness: 0.35 }));
scene.add(chaser);
const burnMat = new THREE.MeshBasicMaterial({ color: 0xffd166 });
const burnGlyphs = DATA.burns.map((b) => {
  let k = 0;
  while (k < NPT - 1 && T[k] < b.t) k++;
  const g = new THREE.Mesh(new THREE.SphereGeometry(2.5, 10, 8), burnMat);
  g.position.copy(toScene(X[k][0], X[k][1], X[k][2]));
  g.visible = false;
  scene.add(g);
  return { t: b.t, mesh: g, dv: Math.hypot(...b.dv) };
});

// --- playback state (decoupled from the render loop) ------------------
let simT = 0, playing = false, idx = 0;
const T_END = T[NPT - 1];
function locate(t) {
  let k = Math.min(idx, NPT - 2);
  if (T[k] > t) k = 0;
  while (k < NPT - 2 && T[k + 1] <= t) k++;
  idx = k;
  const dt = T[k + 1] - T[k];
  const f = dt > 0 ? (t - T[k]) / dt : 0;
  const s = new Array(6);
  for (let j = 0; j < 6; j++) s[j] = X[k][j] + f * (X[k + 1][j] - X[k][j]);
  return s;
}
let state = locate(0);
setInterval(() => {
  if (!playing) return;
  simT = Math.min(T_END, simT + 0.05 * Number(speedSel.value));
  if (simT >= T_END) playing = false;
  applyTime();
}, 50);

function applyTime() {
  state = locate(simT);
  trailGeom.setDrawRange(0, idx + 2);
  chaser.position.copy(toScene(state[0], state[1], state[2]));
  for (const b of burnGlyphs) b.visible = b.t <= simT;
  scrub.value = String(simT / T_END);
  const range = Math.hypot(state[0], state[1], state[2]);
  const speed = Math.hypot(state[3], state[4], state[5]);
  const dvSpent = burnGlyphs.reduce((a, b) => a + (b.t <= simT ? b.dv : 0), 0);
  hud.innerHTML =
    `<div><span class="k">t</span><span class="v">${simT.toFixed(1)} s</span></div>` +
    `<div><span class="k">range</span><span class="v">${range.toFixed(1)} m</span></div>` +
    `<div><span class="k">speed</span><span class="v">${speed.toFixed(3)} m/s</span></div>` +
    `<div><span class="k">dv spent</span><span class="v">${dvSpent.toFixed(3)} m/s</span></div>`;
  clock.textContent = `${simT.toFixed(1)} / ${T_END.toFixed(0)} s`;
  playBtn.innerHTML = playing ? "&#10074;&#10074; pause" : "&#9654; play";
}

// --- cameras -----------------------------------------------------------
let camMode = "follow";
const orbit = { theta: 0.9, phi: 0.35, r: 320 };
function applyCamera() {
  if (camMode === "follow") {
    const toDock = new THREE.Vector3().subVectors(chaser.position, DOCK);
    const d = Math.max(40, toDock.length() * 0.35);
    toDock.normalize();
    camera.position.copy(chaser.position)
      .addScaledVector(toDock, d)
      .add(new THREE.Vector3(0, d * 0.45, d * 0.3));
    camera.lookAt(chaser.position);
  } else {
    const c = chaser.position;
    camera.position.set(
      c.x + orbit.r * Math.cos(orbit.phi) * Math.cos(orbit.theta),
      c.y + orbit.r * Math.sin(orbit.phi),
      c.z + orbit.r * Math.cos(orbit.phi) * Math.sin(orbit.theta));
    camera.lookAt(c);
  }
}
let dragging = false, px = 0, py = 0;
canvas.addEventListener("pointerdown", (e) => {
  dragging = true; px = e.clientX; py = e.clientY;
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener("pointermove", (e) => {
  if (!dragging || camMode !== "orbit") return;
  orbit.theta += (e.clientX - px) * 0.005;
  orbit.phi = Math.max(-1.4, Math.min(1.4, orbit.phi + (e.clientY - py) * 0.005));
  px = e.clientX; py = e.clientY;
});
canvas.addEventListener("pointerup", () => { dragging = false; });
canvas.addEventListener("wheel", (e) => {
  if (camMode !== "orbit") return;
  orbit.r = Math.max(15, Math.min(5000, orbit.r * (e.deltaY > 0 ? 1.15 : 0.87)));
  e.preventDefault();
}, { passive: false });

// --- controls ----------------------------------------------------------
const hud = document.getElementById("hud");
const playBtn = document.getElementById("play");
const speedSel = document.getElementById("speed");
const scrub = document.getElementById("scrub");
const clock = document.getElementById("clock");
const modeBtn = document.getElementById("mode");
playBtn.onclick = () => {
  if (!playing && simT >= T_END) simT = 0;
  playing = !playing;
  applyTime();
};
scrub.oninput = () => { playing = false; simT = Number(scrub.value) * T_END; applyTime(); };
modeBtn.onclick = () => {
  if (camMode === "follow") {
    // seed the free orbit from the current pose so the switch doesn't jump
    const rel = new THREE.Vector3().subVectors(camera.position, chaser.position);
    orbit.r = rel.length();
    orbit.phi = Math.asin(rel.y / orbit.r);
    orbit.theta = Math.atan2(rel.z, rel.x);
    camMode = "orbit";
  } else camMode = "follow";
  modeBtn.textContent = `camera: ${camMode}`;
};

document.getElementById("scenario").textContent =
  `${DATA.meta.name} — ${DATA.meta.orbit} — dv ${DATA.meta.dv_total} m/s`;
const bl = document.getElementById("buildlink");
bl.textContent = `build ${BUILD}`;
bl.href = `https://github.com/adi-oltean/podium/commit/${SRC_COMMIT}`;
if (SRC_COMMIT !== "HEAD") bl.title = `source commit ${SRC_COMMIT.slice(0, 10)}`;

// --- render loop (renders every frame; playback advances on its timer) --
function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (canvas.width !== w || canvas.height !== h) {
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
}
function frame() {
  resize();
  applyCamera();
  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}
applyTime();
frame();

// debug/test handle (used by the Playwright suite)
window.__P3D = {
  t: () => simT,
  range: () => Math.hypot(state[0], state[1], state[2]),
  mode: () => camMode,
  drawCalls: () => renderer.info.render.calls,
  setT: (t) => { simT = Math.min(T_END, Math.max(0, t)); applyTime(); },
  play: (on) => { playing = on; },
};
</script>
</body>
</html>
